name: Sync Archillator to archilles.org

# DISABLED 2026-05-20 — auto-sync neutralisiert.
# Diese Action kopierte archillator.html (alte Design-Version) per rohem `cp`
# nach archilles.org/archillator/index.html und ÜBERSCHRIEB damit das kanonische
# Live-Tool (neues Design + Ollama + MD + lokale Fonts + Site-Navbar), das jetzt
# direkt im archilles.org-Repo gepflegt wird. Der Push-Trigger ist deshalb
# entfernt; die Action läuft nur noch manuell. NICHT wieder auf push umstellen,
# ohne vorher die Source-of-Truth zu klären und einen Fonts/Navbar-Anpassungs-
# schritt einzubauen.
on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout archillator repo
        uses: actions/checkout@v4

      - name: Checkout archilles.org repo
        uses: actions/checkout@v4
        with:
          repository: kasssandr/archilles.org
          token: ${{ secrets.WEBSITE_SYNC_TOKEN }}
          path: website

      - name: Copy files
        run: |
          cp archillator.html website/archillator/index.html
          cp favicon.svg website/archillator/favicon.svg

      - name: Commit and push
        run: |
          cd website
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add archillator/
          if git diff --staged --quiet; then
            echo "No changes to sync"
          else
            git commit -m "Sync archillator from source repo"
            git push
          fi
