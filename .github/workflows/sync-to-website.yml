name: Sync Archillator to archilles.org

# Source of Truth ist DIESES Repo (kasssandr/archillator).
# archilles.org/archillator/ ist eine Kopie — dort NICHT direkt editieren.
#
# Produkt = index.html + js/ (DOCX-Bridge). Beides muss mitwandern.
# Single-File-Sync (nur index.html) ist absichtlich aufgegeben.

on:
  push:
    branches: [main]
    paths:
      - index.html
      - js/**
      - .github/workflows/sync-to-website.yml
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout archillator repo (Quelle)
        uses: actions/checkout@v4

      - name: Checkout archilles.org repo (Ziel)
        uses: actions/checkout@v4
        with:
          repository: kasssandr/archilles.org
          token: ${{ secrets.WEBSITE_SYNC_TOKEN }}
          path: website

      - name: Quelle und Ziel pruefen
        run: |
          test -f index.html || { echo "index.html fehlt im Quell-Repo"; exit 1; }
          test -f js/docx-bridge.js || { echo "js/docx-bridge.js fehlt im Quell-Repo"; exit 1; }
          test -d website/archillator || { echo "website/archillator/ fehlt im Ziel-Repo"; exit 1; }

      - name: Kopieren
        run: |
          cp index.html website/archillator/index.html
          mkdir -p website/archillator/js
          cp js/docx-bridge.js website/archillator/js/docx-bridge.js

      - name: Commit and push
        run: |
          cd website
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add archillator/index.html archillator/js/docx-bridge.js
          if git diff --staged --quiet; then
            echo "Keine Aenderung - nichts zu synchronisieren."
          else
            git commit -m "sync(archillator): Web-Dateien aus dem Quell-Repo (${GITHUB_SHA::7})"
            git push
          fi
